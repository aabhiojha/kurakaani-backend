server:
  port: 8080

spring:
  application:
    name: kurakani-monolith

  datasource:
    username: postgres
    password: postgres
    url: jdbc:postgresql://localhost:5432/chat-app-db
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

#  security:
#    oauth2:
#      client:
#        registration:
#          github:
#            client-id: ${GITHUB_CLIENT_ID}
#            client-secret: ${GITHUB_CLIENT_SECRET}
#          google:
#            client-id: ${GOOGLE_CLIENT_ID}
#            client-secret: ${GOOGLE_CLIENT_SECRET}
#            scope:
#              - openid
#              - profile
#              - email
#            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    enabled: true
    baseline-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true


logging:
  level:
    org.springframework.security: DEBUG
    root: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
    display-request-duration: true

storage:
  endpoint: ${STORAGE_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${STORAGE_ACCESS_KEY:s3admin}
  secret-key: ${STORAGE_SECRET_KEY:s3admin}
  bucket: ${STORAGE_BUCKET:kurakaani}
  region: ${STORAGE_REGION:garage}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS}
